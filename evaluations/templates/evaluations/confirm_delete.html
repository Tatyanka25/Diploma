{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow rounded-4 overflow-hidden text-center">
                <div class="card-body p-5">
                    <div class="bg-warning bg-opacity-10 text-warning rounded-circle d-inline-flex align-items-center justify-content-center mb-4" style="width: 70px; height: 70px;">
                        <i class="bi bi-trash3-fill fs-2"></i>
                    </div>
                    
                    <h3 class="fw-bold mb-3">Подтвердите удаление</h3>
                    <p class="text-secondary mb-4">
                        Вы действительно хотите удалить сотрудника <br>
                        <strong class="text-dark">{{ target.get_full_name }}</strong>?
                    </p>

                    <div class="p-3 bg-light rounded-3 mb-4 text-start">
                        <ul class="list-unstyled small mb-0 text-muted">
                            <li class="mb-2"><i class="bi bi-check2 me-2"></i>Доступ к системе будет заблокирован</li>
                            <li><i class="bi bi-check2 me-2"></i>История оценок останется в архивах компании</li>
                        </ul>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <a href="{% url 'management_list' %}" class="btn btn-light flex-grow-1 py-2 rounded-pill">
                                Отмена
                            </a>
                            <button type="submit" class="btn btn-danger flex-grow-1 py-2 rounded-pill shadow-sm">
                                Удалить
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
